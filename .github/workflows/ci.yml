name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out SharpBench
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build SharpBench.sln -c Release

      # Runs the task-contract gate: every task's reference.cs must pass its hidden
      # tests and its wrong.cs must fail, through the SharpBench.Sandbox process.
      - name: Test
        run: dotnet test SharpBench.sln -c Release --no-build
